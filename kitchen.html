<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿毛烧烤 · 厨房看板</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --card: #1a1a1a; --border: #333;
    --red: #e63946; --fire: #ff6b35; --gold: #f0d68a;
    --text: #f0f0f0; --dim: #888; --new-bg: #1a0a0a;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh; overflow-x: hidden;
    padding-bottom: 20px;
  }

  .header {
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(180deg, rgba(10,10,10,1) 60%, transparent);
    padding: 16px 20px 12px;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .header .title { font-size: 28px; font-weight: 900; letter-spacing: 4px; }
  .header .title em { color: var(--fire); font-style: normal; }
  .header .info { font-size: 13px; color: var(--dim); }
  .header .info .dot { color: #4ade80; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #order-board {
    padding: 0 16px;
    display: flex; flex-wrap: wrap; gap: 12px;
    justify-content: center;
  }

  .order-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px; padding: 20px 24px;
    min-width: 280px; max-width: 400px; flex: 1;
    animation: slideIn 0.4s ease;
    position: relative;
  }
  .order-card.new {
    border-color: var(--fire);
    background: var(--new-bg);
    box-shadow: 0 0 40px rgba(255,107,53,0.2);
    animation: slideIn 0.3s ease, glow 2s ease-in-out 3;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-20px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 20px rgba(255,107,53,0.1); }
    50%     { box-shadow: 0 0 60px rgba(255,107,53,0.4); }
  }

  .order-no {
    font-size: 36px; font-weight: 900; color: var(--fire);
    letter-spacing: 3px; margin-bottom: 12px;
  }
  .order-no .tag {
    font-size: 12px; background: var(--red); color: #fff;
    padding: 3px 10px; border-radius: 6px;
    vertical-align: middle; margin-left: 10px;
  }
  .order-items {
    font-size: 22px; line-height: 1.8;
    color: var(--text); margin-bottom: 14px;
    border-bottom: 1px dashed var(--border);
    padding-bottom: 14px;
  }
  .order-items span { display: inline-block; margin-right: 6px; }
  .order-foot {
    display: flex; justify-content: space-between; align-items: center;
  }
  .order-total {
    font-size: 32px; font-weight: 900;
    color: var(--gold);
  }
  .order-time {
    font-size: 14px; color: var(--dim);
  }

  .order-actions {
    margin-top: 10px; display: flex; gap: 8px;
  }
  .btn-done, .btn-cancel {
    flex: 1; border: none; border-radius: 8px; padding: 8px 0;
    font-size: 16px; font-weight: 700; cursor: pointer;
    letter-spacing: 2px; transition: all 0.15s;
  }
  .btn-done { background: #166534; color: #4ade80; }
  .btn-done:active { background: #22c55e; color: #000; }
  .btn-cancel { background: #450a0a; color: #fca5a5; }
  .btn-cancel:active { background: #dc2626; color: #fff; }

  .order-card.done { border-color: #4ade80; background: #0a1a0a; }
  .order-card.done::after { content: '✅ 已完成'; position: absolute; top: 10px; right: 14px; font-size: 14px; opacity: 0.7; pointer-events: none; }
  .order-card.done .order-items { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.2); }
  .order-card.done .order-actions { display: none; }

  .order-card.cancelled { border-color: #ef4444; background: #1a0a0a; opacity: 0.55; }
  .order-card.cancelled::after { content: '✕ 已取消'; position: absolute; top: 10px; right: 14px; font-size: 14px; color: #fca5a5; pointer-events: none; }
  .order-card.cancelled .order-items { text-decoration: line-through; text-decoration-color: rgba(252,165,165,0.3); }
  .order-card.cancelled .order-actions { display: none; }

  .empty-state {
    text-align: center; padding: 80px 20px; color: var(--dim);
  }
  .empty-state .icon { font-size: 80px; margin-bottom: 20px; opacity: 0.3; }
  .empty-state .msg  { font-size: 20px; }

  .sound-toggle {
    position: fixed; bottom: 20px; right: 20px;
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--border);
    color: var(--dim); font-size: 22px;
    cursor: pointer; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    transition: 0.3s;
  }
  .sound-toggle.on { background: var(--red); color: #fff; border-color: var(--red); }

  #new-order-toast {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    background: var(--red); color: #fff;
    text-align: center; padding: 16px; font-size: 20px; font-weight: 900;
    transform: translateY(-100%); transition: transform 0.3s ease;
  }
  #new-order-toast.show { transform: translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="title"><em>🔥</em> 阿毛厨房 <em>🔥</em></div>
  <div class="info"><span class="dot">●</span> 实时在线 · <span id="count">0</span> 单</div>
</div>

<div id="order-board"></div>

<div class="empty-state" id="empty">
  <div class="icon">🍖</div>
  <div class="msg">等待订单中...<br>客人扫码点单后会立即显示</div>
</div>

<div id="new-order-toast">🛎️ 新订单！</div>

<button class="sound-toggle on" id="soundBtn" onclick="toggleSound()">🔊</button>

<script>
// Supabase via fetch (no SDK needed)
const SB_URL = 'https://kpdzliicwddunewzhwqm.supabase.co/rest/v1/orders';
const SB_KEY = 'sb_publishable_mtif-iW5dFnU2FZWjPyJMA_fEZhfjNh';
const SB_HDR = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };
function sbQuery(params) {
  let url = SB_URL + '?' + params;
  return fetch(url, { headers: SB_HDR }).then(r => r.json());
}
function sbUpdate(id, data) {
  return fetch(SB_URL + '?id=eq.' + id, { method: 'PATCH', headers: Object.assign({'Content-Type':'application/json','Prefer':'return=minimal'}, SB_HDR), body: JSON.stringify(data) });
}

const POLL_INTERVAL = 2000;
let soundOn = true;
let knownOrders = new Set();
let hiddenOrders = JSON.parse(localStorage.getItem('amao_kitchen_hidden') || '[]'); // [{id, action}]
let orderStatuses = new Map();
try { const saved = JSON.parse(localStorage.getItem('amao_kitchen_status') || '[]'); saved.forEach(s => orderStatuses.set(s.id, s.status)); } catch(e) {}

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundBtn').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundBtn').classList.toggle('on', soundOn);
}

function beep() {
  if (!soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.frequency.setValueAtTime(1200, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

function showToast() {
  const t = document.getElementById('new-order-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function fmtTime(iso) {
  if (!iso) return '';
  const m = iso.match(/T(\d{2}):(\d{2})/);
  if (m) return m[1] + ':' + m[2];
  return '';
}

function fmtId(id) { return '#' + String(id).slice(-6); }

function markOrder(id, action) {
  orderStatuses.set(id, action);
  const arr = Array.from(orderStatuses.entries()).map(([i, s]) => ({ id: i, status: s }));
  localStorage.setItem('amao_kitchen_status', JSON.stringify(arr.slice(-100)));
  if (currentOrders) renderOrders(currentOrders);
}
let currentOrders = null;

function renderOrders(orders) {
  const board = document.getElementById('order-board');
  const empty = document.getElementById('empty');
  const countEl = document.getElementById('count');

  countEl.textContent = orders.length;

  if (!orders.length) {
    empty.style.display = 'block';
    board.innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  board.innerHTML = orders.map((o) => {
    const isNew = !knownOrders.has(o.id);
    const status = orderStatuses.get(o.id);
    let cls = 'order-card';
    if (status === 'done') cls += ' done';
    else if (status === 'cancelled') cls += ' cancelled';
    else if (isNew) cls += ' new';

    return `
      <div class="${cls}" data-id="${o.id}">
        <div class="order-no">
          ${fmtId(o.id)}
          ${isNew && !status ? '<span class="tag">新</span>' : ''}
        </div>
        <div class="order-items">
          ${(o.items||[]).map(i => `<span>${i.n} ×1</span>`).join('')}
        </div>
        <div class="order-foot">
          <span class="order-total">¥${o.total}</span>
          <span class="order-time">${fmtTime(o.created_at)}</span>
        </div>
        ${!status ? `
        <div class="order-actions">
          <button class="btn-done" onclick="markOrder(${o.id},'done')">✅ 完成</button>
          <button class="btn-cancel" onclick="markOrder(${o.id},'cancelled')">✕ 取消</button>
        </div>
        ` : ''}
      </div>
    `;
  }).join('');

  orders.forEach(o => knownOrders.add(o.id));
}

async function poll() {
  try {
    const orders = await sbQuery('select=*&order=id.desc&limit=50');
    currentOrders = orders;

    const newOrders = orders.filter(o => !knownOrders.has(o.id) && !orderStatuses.has(o.id));
    if (newOrders.length > 0) { beep(); showToast(); }

    renderOrders(orders);
  } catch(e) {}
}

poll();
setInterval(poll, POLL_INTERVAL);

document.addEventListener('click', () => {
  if (window.AudioContext || window.webkitAudioContext) { new (window.AudioContext || window.webkitAudioContext)(); }
}, { once: true });
</script>
</body>
</html>
